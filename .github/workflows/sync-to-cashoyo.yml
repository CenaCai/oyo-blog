name: Sync to CashOyo

on:
  schedule:
    - cron: '0 9 * * *'  # UTC 9:00 (北京时间 17:00)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Sync posts to CashOyo
        env:
          CASHOYO_SECRET: ${{ secrets.CASHOYO_SECRET }}
        run: python sync_posts.py

      - name: Commit pushed.json update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pushed.json
          git diff --staged --quiet || git commit -m "Update pushed articles record"
          git push
